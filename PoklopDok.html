<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PoklopDok">
<meta name="theme-color" content="#1D9E75">
<title>PoklopDok – Poklopsystem</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#f5f5f0;font-family:'Segoe UI',system-ui,sans-serif}
.screen{display:none;position:absolute;inset:0;overflow-y:auto;padding:1rem;padding-bottom:2rem;background:#f5f5f0}
.screen.active{display:block}
h2{font-size:18px;font-weight:600;color:#111;margin-bottom:1rem}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:14px;padding:1rem 1.25rem;margin-bottom:.75rem}
label{font-size:13px;color:#666;display:block;margin-bottom:4px;margin-top:.6rem}
input[type=text],input[type=number],select,textarea{
  width:100%;padding:10px 12px;font-size:15px;border:1px solid #ddd;border-radius:10px;
  background:#fafaf8;color:#111;margin-bottom:.1rem;outline:none;
  -webkit-appearance:none;appearance:none;font-family:inherit
}
input:focus,select:focus,textarea:focus{border-color:#1D9E75;background:#fff}
textarea{height:72px;resize:none}
.btn{
  width:100%;padding:14px;font-size:15px;font-weight:600;border-radius:12px;
  cursor:pointer;border:none;margin-bottom:.5rem;letter-spacing:.01em;
  -webkit-appearance:none;appearance:none
}
.btn-primary{background:#1D9E75;color:#fff}
.btn-primary:active{background:#0F6E56}
.btn-secondary{background:#fff;border:1px solid #ddd;color:#333}
.btn-secondary:active{background:#f5f5f0}
.btn-danger{background:#fff;border:1px solid #f0bbbb;color:#c0392b}
.btn-danger:active{background:#fdf0f0}
.btn-icon{background:#f5f5f0;border:1px solid #ddd;border-radius:10px;padding:0;width:52px;height:52px;cursor:pointer;color:#333;font-size:22px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-top:.25rem}
.back-btn{background:none;border:none;cursor:pointer;font-size:24px;color:#111;padding:4px;line-height:1;flex-shrink:0}
.app-header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;padding-top:.5rem}
.app-icon{width:48px;height:48px;border-radius:14px;background:#1D9E75;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.section-label{font-size:11px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin:.75rem 0 .4rem}
.obhl-item{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:.85rem 1rem;margin-bottom:.5rem;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.obhl-item:active{background:#f5f5f0}
.pokl-item{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:.85rem 1rem;margin-bottom:.5rem;cursor:pointer}
.pokl-item:active{background:#f5f5f0}
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.badge-green{background:#e8f5ee;color:#0F6E56}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0ec}
.toggle-row:last-child{border-bottom:none}
.toggle-sw{position:relative;width:48px;height:28px;flex-shrink:0}
.toggle-sw input{opacity:0;width:0;height:0;position:absolute}
.sw-track{position:absolute;inset:0;background:#ddd;border-radius:14px;cursor:pointer;transition:.2s}
.sw-track:before{content:'';position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input:checked+.sw-track{background:#1D9E75}
input:checked+.sw-track:before{transform:translateX(20px)}
#camera-wrap{position:relative;width:100%;border-radius:14px;overflow:hidden;background:#111;aspect-ratio:4/3;min-height:200px}
#video{width:100%;height:100%;object-fit:cover;display:block}
#canvas-el{display:none}
.cam-bottom-overlay{position:absolute;bottom:0;left:0;right:0;padding:10px 12px 12px;background:linear-gradient(transparent,rgba(0,0,0,.72));color:#fff;pointer-events:none}
.cam-bottom-overlay.hidden{display:none}
#ov-time-text{font-size:18px;font-weight:600;letter-spacing:.02em}
#ov-addr-text{font-size:11px;margin-top:2px;opacity:.88}
#ov-map-frame-wrap{position:absolute;top:8px;right:8px;width:96px;height:76px;border-radius:8px;overflow:hidden;border:2px solid rgba(255,255,255,.85)}
#ov-map-frame-wrap.hidden{display:none}
.cam-btns{display:flex;gap:10px;margin-top:.75rem;align-items:center;justify-content:center}
.shutter{width:68px;height:68px;border-radius:50%;background:#1D9E75;border:3px solid #fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.shutter:active{background:#0F6E56;transform:scale(.96)}
.export-box{background:#fff;border-radius:12px;border:1px solid #e5e5e0;padding:1rem;font-size:13px;font-family:monospace;white-space:pre-wrap;color:#222;max-height:340px;overflow-y:auto;margin-bottom:.75rem;line-height:1.7}
#photo-prev{width:100%;border-radius:12px;margin-bottom:.75rem;display:none;object-fit:cover;max-height:220px}
.empty-state{color:#aaa;font-size:14px;padding:.75rem 0;text-align:center}
.chevron{color:#ccc;font-size:20px}
.coord-text{font-size:11px;color:#aaa;margin-top:2px;margin-bottom:.25rem}
.ine-input{margin-top:.4rem;display:none}
.cam-err{color:#fff;padding:2rem 1rem;text-align:center;font-size:14px;line-height:1.6}
</style>
</head>
<body>

<!-- SCREEN: Home -->
<div class="screen active" id="s-home">
  <div class="app-header">
    <div class="app-icon">🔩</div>
    <div>
      <div style="font-size:20px;font-weight:700;color:#111">PoklopDok</div>
      <div style="font-size:13px;color:#888">Poklopsystem s.r.o.</div>
    </div>
  </div>
  <button class="btn btn-primary" onclick="go('s-nova')">+ Nová obhliadka</button>
  <div class="section-label">Uložené obhliadky</div>
  <div id="home-list"><div class="empty-state">Žiadne záznamy</div></div>
</div>

<!-- SCREEN: Nová obhliadka -->
<div class="screen" id="s-nova">
  <div class="top-bar">
    <button class="back-btn" onclick="go('s-home')">←</button>
    <h2 style="margin:0">Nová obhliadka</h2>
  </div>
  <div class="card">
    <label>Zákazník / organizácia *</label>
    <input type="text" id="n-klient" placeholder="napr. Regionálna správa ciest Nitra">
    <label>Miesto / popis *</label>
    <input type="text" id="n-miesto" placeholder="napr. Štefánikova trieda, pri MÚ">
    <label>Počet poklopov (odhad)</label>
    <input type="number" id="n-pocet" placeholder="napr. 4" min="1" inputmode="numeric">
    <label>Poznámka k zákazke</label>
    <textarea id="n-pozn" placeholder="napr. zodvihnutie vpustí na autobusovej zastávke"></textarea>
  </div>
  <button class="btn btn-primary" onclick="vytvorObhl()">Pokračovať →</button>
</div>

<!-- SCREEN: Detail obhliadky -->
<div class="screen" id="s-detail">
  <div class="top-bar">
    <button class="back-btn" onclick="go('s-home')">←</button>
    <div style="flex:1;min-width:0">
      <div style="font-size:16px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="det-title"></div>
      <div style="font-size:12px;color:#888" id="det-sub"></div>
    </div>
  </div>
  <button class="btn btn-primary" onclick="go('s-foto')">📷 Pridať poklop</button>
  <div class="section-label">Poklopy</div>
  <div id="pokl-list"><div class="empty-state">Zatiaľ žiadne</div></div>
  <div style="margin-top:.75rem">
    <button class="btn btn-secondary" onclick="showExport()">📋 Zobraziť súhrn</button>
    <button class="btn btn-danger" onclick="delObhl()">🗑 Vymazať obhliadku</button>
  </div>
</div>

<!-- SCREEN: Foťák -->
<div class="screen" id="s-foto">
  <div class="top-bar">
    <button class="back-btn" onclick="stopCam();go('s-detail')">←</button>
    <h2 style="margin:0">Odfotiť poklop</h2>
  </div>
  <div class="card" style="padding:.75rem 1rem">
    <div style="font-size:12px;color:#999;font-weight:600;letter-spacing:.06em;margin-bottom:.25rem">PRVKY NA FOTKE</div>
    <div class="toggle-row">
      <span style="font-size:15px;color:#222">⏰ Čas a dátum</span>
      <label class="toggle-sw"><input type="checkbox" id="ov-time" checked onchange="updOv()"><span class="sw-track"></span></label>
    </div>
    <div class="toggle-row">
      <span style="font-size:15px;color:#222">📍 Adresa</span>
      <label class="toggle-sw"><input type="checkbox" id="ov-addr" checked onchange="updOv()"><span class="sw-track"></span></label>
    </div>
    <div class="toggle-row">
      <span style="font-size:15px;color:#222">🗺 Mapka</span>
      <label class="toggle-sw"><input type="checkbox" id="ov-map" checked onchange="updOv()"><span class="sw-track"></span></label>
    </div>
  </div>
  <div id="camera-wrap">
    <video id="video" autoplay playsinline muted webkit-playsinline></video>
    <canvas id="canvas-el"></canvas>
    <div class="cam-bottom-overlay" id="cam-ov">
      <div id="ov-time-text"></div>
      <div id="ov-addr-text">Načítavam GPS...</div>
    </div>
    <div id="ov-map-frame-wrap">
      <iframe id="ov-map-frame" style="width:100%;height:100%;border:none" src="about:blank" loading="lazy"></iframe>
    </div>
  </div>
  <div class="cam-btns">
    <button class="btn-icon" onclick="switchCam()" title="Otočiť kameru">🔄</button>
    <button class="shutter" onclick="capture()" title="Odfotiť">📸</button>
    <label class="btn-icon" for="file-input" title="Nahrať zo súborov" style="cursor:pointer">🖼</label>
    <input type="file" id="file-input" accept="image/*" onchange="fromFile(event)" style="display:none">
  </div>
  <div style="text-align:center;font-size:12px;color:#aaa;margin-top:.4rem">📸 odfotiť &nbsp;·&nbsp; 🔄 otočiť kameru &nbsp;·&nbsp; 🖼 zo súborov</div>
</div>

<!-- SCREEN: Údaje o poklopoch -->
<div class="screen" id="s-udaje">
  <div class="top-bar">
    <button class="back-btn" onclick="go('s-detail')">←</button>
    <h2 style="margin:0" id="u-title">Poklop X1</h2>
  </div>
  <img id="photo-prev" alt="Foto poklopu">
  <div class="card">

    <label>Typ poklopu</label>
    <select id="u-typ" onchange="chkTyp()">
      <option value="Kanalizačný poklop">Kanalizačný poklop</option>
      <option value="Vpusť">Vpusť</option>
      <option value="Vodomerná šachta">Vodomerná šachta</option>
      <option value="Hydrant">Hydrant</option>
      <option value="Šupátko / prípojka">Šupátko / prípojka</option>
      <option value="Iné">Iné</option>
    </select>
    <div class="ine-input" id="typ-ine-wrap">
      <input type="text" id="u-typ-ine" placeholder="Uveď typ poklopu...">
    </div>

    <label>Rozmer poklopu (napr. 600x600mm, DN600)</label>
    <input type="text" id="u-rozmer" placeholder="napr. 600x600mm">

    <label>Typ povrchu</label>
    <select id="u-povrch" onchange="chkPovrch()">
      <option value="Asfalt">Asfalt</option>
      <option value="Betón">Betón</option>
      <option value="Zámková dlažba">Zámková dlažba</option>
      <option value="V tráve">V tráve</option>
      <option value="Iné">Iné</option>
    </select>
    <div class="ine-input" id="povrch-ine-wrap">
      <input type="text" id="u-povrch-ine" placeholder="Uveď typ povrchu...">
    </div>

    <label>Rozmer výrezu / asfaltáže (napr. 1,2x1,2m)</label>
    <input type="text" id="u-vyrez" placeholder="napr. 1,2x1,2m">

    <label>Hĺbka (napr. cca 20cm)</label>
    <input type="text" id="u-hlbka" placeholder="napr. cca 20cm">

    <label>GPS adresa</label>
    <input type="text" id="u-adresa" placeholder="Načítava sa...">
    <div class="coord-text" id="u-coords"></div>

    <label>Poznámka</label>
    <textarea id="u-pozn" placeholder="napr. konus vyosený, poklop prepadnutý, poškodený..."></textarea>
  </div>
  <button class="btn btn-primary" onclick="ulozPokl()">✔ Uložiť poklop</button>
</div>

<!-- SCREEN: Export -->
<div class="screen" id="s-export">
  <div class="top-bar">
    <button class="back-btn" onclick="go('s-detail')">←</button>
    <h2 style="margin:0">Súhrn obhliadky</h2>
  </div>
  <div class="export-box" id="exp-text"></div>
  <button class="btn btn-primary" onclick="copyExp()">📋 Kopírovať text</button>
  <button class="btn btn-secondary" onclick="go('s-detail')">Späť</button>
</div>

<script>
var DB = JSON.parse(localStorage.getItem('poklopdok_v2') || '{}');
var CUR = null;
var PHOTO = null;
var ADDR = '';
var COORDS = null;
var STREAM = null;
var FACING = 'environment';
var CLOCK = null;
var EDIT_IDX = -1;

function save(){ localStorage.setItem('poklopdok_v2', JSON.stringify(DB)); }

function go(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 's-home') renderHome();
  if(id === 's-detail') renderDetail();
  if(id === 's-foto') startCam();
  if(id !== 's-foto') stopCam();
}

function renderHome(){
  var el = document.getElementById('home-list');
  var keys = Object.keys(DB);
  if(!keys.length){ el.innerHTML = '<div class="empty-state">Žiadne záznamy</div>'; return; }
  el.innerHTML = keys.slice().reverse().map(k => {
    var o = DB[k];
    return '<div class="obhl-item" onclick="openObhl(\''+k+'\')"><div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(o.klient)+'</div><div style="font-size:13px;color:#888">'+esc(o.miesto)+'</div><div style="font-size:12px;color:#aaa">'+o.datum+' · '+(o.poklopy?o.poklopy.length:0)+' poklopov</div></div><span class="chevron">›</span></div>';
  }).join('');
}

function vytvorObhl(){
  var k = document.getElementById('n-klient').value.trim();
  var m = document.getElementById('n-miesto').value.trim();
  if(!k||!m){ alert('Vyplň zákazníka a miesto.'); return; }
  var id = 'ob_'+Date.now();
  var now = new Date();
  DB[id] = { klient:k, miesto:m, pocet:document.getElementById('n-pocet').value||'', pozn:document.getElementById('n-pozn').value, datum:now.toLocaleDateString('sk-SK'), poklopy:[] };
  save();
  CUR = id;
  document.getElementById('n-klient').value='';
  document.getElementById('n-miesto').value='';
  document.getElementById('n-pocet').value='';
  document.getElementById('n-pozn').value='';
  go('s-detail');
}

function openObhl(id){ CUR=id; go('s-detail'); }

function renderDetail(){
  if(!CUR) return;
  var o = DB[CUR];
  document.getElementById('det-title').textContent = o.klient;
  document.getElementById('det-sub').textContent = o.miesto+' · '+o.datum;
  var el = document.getElementById('pokl-list');
  if(!o.poklopy||!o.poklopy.length){ el.innerHTML='<div class="empty-state">Zatiaľ žiadne</div>'; return; }
  el.innerHTML = o.poklopy.map((p,i)=>{
    var typLabel = p.typ==='Iné' && p.typIne ? p.typIne : p.typ;
    var povrchLabel = p.povrch==='Iné' && p.povrchIne ? p.povrchIne : p.povrch;
    return '<div class="pokl-item" onclick="editPokl('+i+')"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:15px;font-weight:700;color:#1D9E75">'+esc(p.oznacenie)+'</span><span class="badge badge-green">'+esc(typLabel)+'</span></div><div style="font-size:13px;color:#444">'+esc(povrchLabel)+' · výrez: '+esc(p.vyrez)+' · hl: '+esc(p.hlbka)+'</div><div style="font-size:12px;color:#aaa;margin-top:2px">'+esc(p.adresa)+'</div>'+(p.pozn?'<div style="font-size:12px;color:#c0392b;margin-top:2px">⚠ '+esc(p.pozn)+'</div>':'')+'</div>';
  }).join('');
}

function delObhl(){
  if(!confirm('Vymazať túto obhliadku?')) return;
  delete DB[CUR]; save(); CUR=null; go('s-home');
}

// --- KAMERA ---
function startCam(){
  ADDR=''; COORDS=null;
  document.getElementById('ov-addr-text').textContent='Načítavam GPS...';
  document.getElementById('ov-map-frame').src='about:blank';
  getGPS();
  startClock();

  var wrap = document.getElementById('camera-wrap');
  // Reset wrap content in case of previous error
  if(!document.getElementById('video')){
    wrap.innerHTML = '<video id="video" autoplay playsinline muted webkit-playsinline style="width:100%;height:100%;object-fit:cover;display:block"></video><canvas id="canvas-el" style="display:none"></canvas><div class="cam-bottom-overlay" id="cam-ov"><div id="ov-time-text"></div><div id="ov-addr-text">Načítavam GPS...</div></div><div id="ov-map-frame-wrap"><iframe id="ov-map-frame" style="width:100%;height:100%;border:none" src="about:blank" loading="lazy"></iframe></div>';
  }

  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    wrap.innerHTML='<div class="cam-err">Kamera nie je dostupná.<br>Použi 🖼 pre nahranie fotky zo súborov.</div>';
    return;
  }

  var constraints = { video:{ facingMode:{ ideal:FACING }, width:{ ideal:1920 }, height:{ ideal:1080 } }, audio:false };

  navigator.mediaDevices.getUserMedia(constraints)
    .then(function(stream){
      STREAM = stream;
      var v = document.getElementById('video');
      if(!v){ return; }
      v.srcObject = stream;
      // Dôležité pre Android Chrome – musíme explicitne zavolať play()
      var playPromise = v.play();
      if(playPromise !== undefined){
        playPromise.catch(function(err){
          // Autoplay zablokovaný – skúsime znova po user interakcii
          v.addEventListener('click', function(){ v.play(); }, {once:true});
        });
      }
    })
    .catch(function(err){
      var msg = 'Prístup ku kamere zamietnutý.';
      if(err.name==='NotFoundError') msg='Kamera nenájdená.';
      if(err.name==='NotAllowedError') msg='Prístup ku kamere zamietnutý.<br>Skontroluj povolenia v Chrome → Nastavenia → Ochrana súkromia → Povolenia stránky.';
      document.getElementById('camera-wrap').innerHTML='<div class="cam-err">'+msg+'<br><br>Použi 🖼 pre nahranie fotky zo súborov.</div>';
    });
}

function stopCam(){
  if(STREAM){ STREAM.getTracks().forEach(t=>t.stop()); STREAM=null; }
  if(CLOCK){ clearInterval(CLOCK); CLOCK=null; }
}

function switchCam(){
  FACING = FACING==='environment'?'user':'environment';
  if(STREAM){ STREAM.getTracks().forEach(t=>t.stop()); STREAM=null; }
  startCam();
}

function startClock(){
  if(CLOCK) clearInterval(CLOCK);
  tickClock();
  CLOCK = setInterval(tickClock,1000);
}

function tickClock(){
  var now=new Date();
  var t=pad(now.getHours())+':'+pad(now.getMinutes())+' | '+pad(now.getDate())+'/'+pad(now.getMonth()+1)+'/'+now.getFullYear();
  var el=document.getElementById('ov-time-text');
  if(el) el.textContent=t;
}

function pad(n){ return String(n).padStart(2,'0'); }

function updOv(){
  var st=document.getElementById('ov-time').checked;
  var sa=document.getElementById('ov-addr').checked;
  var sm=document.getElementById('ov-map').checked;
  var ov=document.getElementById('cam-ov');
  if(ov){ if(!st&&!sa) ov.classList.add('hidden'); else ov.classList.remove('hidden'); }
  var tel=document.getElementById('ov-time-text');
  var ael=document.getElementById('ov-addr-text');
  if(tel) tel.style.display=st?'':'none';
  if(ael) ael.style.display=sa?'':'none';
  var mw=document.getElementById('ov-map-frame-wrap');
  if(mw) mw.classList.toggle('hidden',!sm);
}

function getGPS(){
  if(!navigator.geolocation){ ADDR='GPS nedostupné'; return; }
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat=pos.coords.latitude, lon=pos.coords.longitude;
    COORDS={lat:lat.toFixed(6),lon:lon.toFixed(6)};
    fetch('https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lon+'&accept-language=sk')
      .then(r=>r.json())
      .then(d=>{
        var a=d.address||{};
        ADDR=[a.road,(a.house_number||''),(a.city||a.town||a.village||''),(a.postcode||'')].filter(Boolean).join(' ').replace(/\s+/g,' ').trim();
        var el=document.getElementById('ov-addr-text');
        if(el) el.textContent=ADDR;
        var mapSrc='https://www.openstreetmap.org/export/embed.html?bbox='+(lon-0.0015)+','+(lat-0.001)+','+(lon+0.0015)+','+(lat+0.001)+'&layer=mapnik&marker='+lat+','+lon;
        var mf=document.getElementById('ov-map-frame');
        if(mf) mf.src=mapSrc;
      })
      .catch(()=>{ ADDR=COORDS.lat+'°N, '+COORDS.lon+'°E'; var el=document.getElementById('ov-addr-text'); if(el) el.textContent=ADDR; });
  },function(){ ADDR='GPS nedostupné'; });
}

function capture(){
  var video=document.getElementById('video');
  var canvas=document.getElementById('canvas-el');
  if(!video||!video.videoWidth||video.videoWidth===0){ alert('Kamera ešte nie je pripravená. Skús za sekundu.'); return; }
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  var ctx=canvas.getContext('2d');
  ctx.drawImage(video,0,0);

  var showTime=document.getElementById('ov-time').checked;
  var showAddr=document.getElementById('ov-addr').checked;
  if(showTime||showAddr){
    var now=new Date();
    var timeStr=pad(now.getHours())+':'+pad(now.getMinutes())+' | '+pad(now.getDate())+'/'+pad(now.getMonth()+1)+'/'+now.getFullYear();
    var h=canvas.height, w=canvas.width;
    var gradH=Math.round(h*0.18);
    var grad=ctx.createLinearGradient(0,h-gradH,0,h);
    grad.addColorStop(0,'rgba(0,0,0,0)');
    grad.addColorStop(1,'rgba(0,0,0,0.75)');
    ctx.fillStyle=grad;
    ctx.fillRect(0,h-gradH,w,gradH);
    ctx.fillStyle='#ffffff';
    if(showTime){ var fs=Math.round(w*0.042); ctx.font='bold '+fs+'px Arial'; ctx.fillText(timeStr,16,h-gradH+fs+4); }
    if(showAddr&&ADDR){ var fs2=Math.round(w*0.028); ctx.font=fs2+'px Arial'; ctx.fillText(ADDR,16,h-14); }
  }
  PHOTO=canvas.toDataURL('image/jpeg',0.88);
  goUdaje();
}

function fromFile(e){
  var file=e.target.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){ PHOTO=ev.target.result; goUdaje(); };
  reader.readAsDataURL(file);
  e.target.value='';
}

function goUdaje(){
  stopCam();
  var o=DB[CUR];
  EDIT_IDX=-1;
  var num=(o.poklopy?o.poklopy.length:0)+1;
  document.getElementById('u-title').textContent='Poklop X'+num;
  document.getElementById('u-adresa').value=ADDR||'';
  document.getElementById('u-coords').textContent=COORDS?COORDS.lat+'°N, '+COORDS.lon+'°E':'';
  document.getElementById('u-pozn').value='';
  document.getElementById('u-hlbka').value='';
  document.getElementById('u-vyrez').value='';
  document.getElementById('u-rozmer').value='';
  document.getElementById('u-typ').value='Kanalizačný poklop';
  document.getElementById('u-povrch').value='Asfalt';
  document.getElementById('typ-ine-wrap').style.display='none';
  document.getElementById('povrch-ine-wrap').style.display='none';
  document.getElementById('u-typ-ine').value='';
  document.getElementById('u-povrch-ine').value='';
  var prev=document.getElementById('photo-prev');
  if(PHOTO){ prev.src=PHOTO; prev.style.display='block'; } else { prev.style.display='none'; }
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-udaje').classList.add('active');
}

function editPokl(i){
  var o=DB[CUR]; var p=o.poklopy[i];
  EDIT_IDX=i; PHOTO=p.foto||null;
  document.getElementById('u-title').textContent=p.oznacenie+' (upraviť)';
  document.getElementById('u-typ').value=p.typ;
  document.getElementById('u-rozmer').value=p.rozmer;
  document.getElementById('u-povrch').value=p.povrch;
  document.getElementById('u-vyrez').value=p.vyrez;
  document.getElementById('u-hlbka').value=p.hlbka;
  document.getElementById('u-adresa').value=p.adresa;
  document.getElementById('u-coords').textContent=p.coords||'';
  document.getElementById('u-pozn').value=p.pozn;
  document.getElementById('u-typ-ine').value=p.typIne||'';
  document.getElementById('u-povrch-ine').value=p.povrchIne||'';
  document.getElementById('typ-ine-wrap').style.display=p.typ==='Iné'?'block':'none';
  document.getElementById('povrch-ine-wrap').style.display=p.povrch==='Iné'?'block':'none';
  var prev=document.getElementById('photo-prev');
  if(PHOTO){ prev.src=PHOTO; prev.style.display='block'; } else { prev.style.display='none'; }
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-udaje').classList.add('active');
}

function chkTyp(){
  var v=document.getElementById('u-typ').value;
  document.getElementById('typ-ine-wrap').style.display=v==='Iné'?'block':'none';
}

function chkPovrch(){
  var v=document.getElementById('u-povrch').value;
  document.getElementById('povrch-ine-wrap').style.display=v==='Iné'?'block':'none';
}

function ulozPokl(){
  var o=DB[CUR];
  if(!o.poklopy) o.poklopy=[];
  var isEdit=EDIT_IDX>=0;
  var ozn=isEdit?o.poklopy[EDIT_IDX].oznacenie:'X'+(o.poklopy.length+1);
  var pokl={
    oznacenie:ozn,
    typ:document.getElementById('u-typ').value,
    typIne:document.getElementById('u-typ-ine').value,
    rozmer:document.getElementById('u-rozmer').value,
    povrch:document.getElementById('u-povrch').value,
    povrchIne:document.getElementById('u-povrch-ine').value,
    vyrez:document.getElementById('u-vyrez').value,
    hlbka:document.getElementById('u-hlbka').value,
    adresa:document.getElementById('u-adresa').value,
    coords:document.getElementById('u-coords').textContent,
    pozn:document.getElementById('u-pozn').value,
    foto:PHOTO||null
  };
  if(isEdit){ o.poklopy[EDIT_IDX]=pokl; } else { o.poklopy.push(pokl); }
  save();
  PHOTO=null; EDIT_IDX=-1;
  go('s-detail');
}

function showExport(){
  var o=DB[CUR];
  var lines=[];
  lines.push('Obhliadka pre '+o.klient);
  lines.push('Miesto: '+o.miesto);
  if(o.pozn) lines.push('Popis: '+o.pozn);
  if(o.pocet) lines.push('Plánovaný počet: '+o.pocet);
  lines.push('Dátum: '+o.datum);
  lines.push('');
  (o.poklopy||[]).forEach(function(p){
    var typLabel = p.typ==='Iné'&&p.typIne ? p.typIne : p.typ;
    var povrchLabel = p.povrch==='Iné'&&p.povrchIne ? p.povrchIne : p.povrch;
    // Formát: X1 - Adresa, Typ - rozmer, hĺbka, povrch výrez, poznámka
    var rozmerPart = p.rozmer ? ' '+p.rozmer : '';
    var hlbkaPart = p.hlbka ? ', hl. '+p.hlbka : '';
    var povrchPart = p.vyrez ? ', '+povrchLabel+' '+p.vyrez : (povrchLabel ? ', '+povrchLabel : '');
    var line = p.oznacenie+' - '+p.adresa+', '+typLabel+rozmerPart+hlbkaPart+povrchPart;
    if(p.pozn) line += ', '+p.pozn;
    lines.push(line);
  });
  document.getElementById('exp-text').textContent=lines.join('\n');
  go('s-export');
}

function copyExp(){
  var t=document.getElementById('exp-text').textContent;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(()=>alert('✓ Skopírované!')).catch(()=>fallbackCopy(t));
  } else { fallbackCopy(t); }
}

function fallbackCopy(t){
  var ta=document.createElement('textarea');
  ta.value=t; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); alert('✓ Skopírované!'); }
  catch(e){ alert('Skopíruj text ručne.'); }
  document.body.removeChild(ta);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

renderHome();
</script>
